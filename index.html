const FILE_ID='1sWd6IQl-5P65i4xTzsSqHOH77P5Zd1PIkzZdtQOteUg';

// ── Branch config: fully dynamic, auto-discovers from Google Sheet ────────
let BRANCHES=[];   // filled after data loads
let BR_LBL={};     // key → display label  (built by regBranch)
let BR_COL={};     // key → hex color      (built by regBranch)
const BR_PAL=['#5B9BD5','#70AD47','#FFC000','#FF6B6B','#A67BC2','#00BCD4','#FF9800','#E91E63','#795548','#607D8B'];
// Seed known branches so charts have stable colors even before data loads
;[['Bangna','Bangna'],['Rangsit','Rangsit'],['Victory','Victory'],['MonoPark','Mono Park'],['SamyanMitrtown','Samyan Mitrtown'],['TrueDigitalPark','True Digital Park']].forEach(([k,l],i)=>{BR_LBL[k]=l;BR_COL[k]=BR_PAL[i];});
// Normalize any raw sheet/tab name → stable internal key
function normBrKey(raw){
  const lo=(raw||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  if(lo.includes('bangna'))return'Bangna';
  if(lo.includes('rangsit'))return'Rangsit';
  if(lo.includes('victory'))return'Victory';
  if(lo.includes('monopark')||lo.includes('mono'))return'MonoPark';
  if(lo.includes('samyan'))return'SamyanMitrtown';
  if(lo.includes('truedigital')||(lo.includes('true')&&lo.includes('digital')))return'TrueDigitalPark';
  // New branches: PascalCase (e.g. "Siam Paragon" → "SiamParagon")
  return (raw||'').trim().split(/\s+/).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join('');
}
// Register branch (idempotent — safe to call multiple times)
function regBranch(key,label){
  if(BR_LBL[key])return;  // already registered
  BR_LBL[key]=label||key;
  BR_COL[key]=BR_PAL[Object.keys(BR_LBL).length-1]||'#999';
}
const TH_MON=['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const EN_MON=['','January','February','March','April','May','June','July','August','September','October','November','December'];
const MON3=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const isDk=()=>document.documentElement.getAttribute('data-theme')==='dark';
const tc=()=>isDk()?'#F0E8DF':'#2C1810';
const gc=()=>isDk()?'rgba(255,255,255,.12)':'rgba(0,0,0,.1)';
const fB=v=>(!v&&v!==0)?'—':'฿'+Math.round(v).toLocaleString('th-TH');
const fK=v=>v>=1000?'฿'+(v/1000).toFixed(0)+'K':'฿'+v;
const fP=(v,d=1)=>v==null?'N/A':(v>0?'+':'')+v.toFixed(d)+'%';
function pN(s){const n=parseFloat(String(s||0).replace(/[,\s%]/g,''));return isNaN(n)?0:n;}

// ── parseSheet: Cowork MCP — dynamic branch & month detection ────────────
function parseSheet(text){
  const res={};
  text.split(/\| Sale Performance /).slice(1).forEach(part=>{
    const lines=part.split('\n');
    // header: e.g. "HomePro Bangna April 2026 |..."
    const hdr=(lines[0]||'').replace(/\s*\|.*$/,'').trim();
    let brName='',mn=0,yr=0;
    // Find first month name in header → everything before = branch name
    for(let i=1;i<=12;i++){
      const idx=hdr.toLowerCase().indexOf(EN_MON[i].toLowerCase());
      if(idx>=0){
        brName=hdr.slice(0,idx).trim();mn=i;
        const ym=hdr.slice(idx).match(/\d{4}/);yr=ym?+ym[0]:0;break;
      }
    }
    if(!brName||!mn||!yr)return;
    const bk=normBrKey(brName);
    regBranch(bk,brName);  // register (idempotent)
    if(!res[bk])res[bk]={};
    const key=yr+'-'+mn;let sum=null;const daily=[];
    lines.forEach(line=>{
      const cells=line.split('|').slice(1,-1).map(c=>c.trim());if(!cells.length)return;
      if(cells[0]===''&&/^[\d,]+/.test((cells[1]||''))&&!sum)
        sum={target:pN(cells[1]),actual:pN(cells[2]),tc:+cells[4]||0,ta:pN(cells[5]),instore:pN(cells[6]),delivery:pN(cells[7]),grab:pN(cells[8]),lman:pN(cells[9])};
      const dm=cells[0]&&cells[0].match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if(dm)daily.push({day:+dm[1],mon:+dm[2],yr:+dm[3],actual:pN(cells[2]),tc:+cells[4]||0,instore:pN(cells[6]),delivery:pN(cells[7]),grab:pN(cells[8]),lman:pN(cells[9])});
      if(!dm&&cells[0]){const sn=parseFloat(cells[0].replace(/,/g,''));if(!isNaN(sn)&&sn>=40000&&sn<=50000){const sd=new Date(Math.round((sn-25569)*86400000));const sday=sd.getUTCDate(),smon=sd.getUTCMonth()+1,syr=sd.getUTCFullYear();if(syr>=2024&&syr<=2030)daily.push({day:sday,mon:smon,yr:syr,actual:pN(cells[2]),tc:+cells[4]||0,instore:pN(cells[6]),delivery:pN(cells[7]),grab:pN(cells[8]),lman:pN(cells[9])});}}
    });
    res[bk][key]={sum,daily,month:mn,year:yr,daysInMon:new Date(yr,mn,0).getDate()};
  });
  return res;
}

// ── fetchSheetNamesFromConfig: read "Branches" sheet tab for branch list ──
// To auto-discover new branches: create a Google Sheet tab named "Branches"
// and list each branch tab name in column A (one per row).
// HTML fetches this sheet via the same gviz mechanism — no API key needed.
async function fetchSheetNamesFromConfig(){
  try{
    const d=await fetchGvizSheet('Branches');
    const rows=(d&&d.table&&d.table.rows)||[];
    const names=rows.map(r=>r.c&&r.c[0]&&r.c[0].v?String(r.c[0].v).trim():'')
      .filter(n=>n&&!n.startsWith('#'));
    if(names.length>0){console.log('[Branches sheet] found:',names);return names;}
  }catch(e){console.log('[Branches sheet] not found, using default list');}
  return[];
}
// ── fetchSheetNamesFeeds: Sheets Feeds API v3 (fallback, published sheets only) ──
function fetchSheetNamesFeeds(){
  return new Promise(resolve=>{
    const cb='_sf'+Date.now();
    const timer=setTimeout(()=>{resolve([]);try{delete window[cb];}catch(e){}},8000);
    window[cb]=(d)=>{
      clearTimeout(timer);

// ── fetchGvizSheet: JSONP sequential (1 sheet at a time, no race) ─────────
function fetchGvizSheet(sheetName){
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>reject(new Error('timeout 20s')),20000);
    window.google=window.google||{};
    window.google.visualization=window.google.visualization||{};
    window.google.visualization.Query={setResponse:(d)=>{clearTimeout(timer);resolve(d);}};
    const s=document.createElement('script');
    s.onerror=()=>{clearTimeout(timer);reject(new Error('script load error'));};
    s.src='https://docs.google.com/spreadsheets/d/'+FILE_ID+'/gviz/tq?tqx=out:json&headers=0'+(sheetName?'&sheet='+encodeURIComponent(sheetName):'')+('&_='+Date.now());
    document.head.appendChild(s);
  });
}

// ── parseGvizDirect: parse gviz response ─────────────────────────────────
// Strategy: Anchor-Interpolation.
// 1. Collect all month-sections in file order (Jan→Jun appear sequentially).
// 2. Sections whose "claimed month" (from date cells) is UNIQUE across all
//    sections are "anchors" (Apr, Jun in our case — their dates are correct).
// 3. Sections whose claimed month appears in multiple sections have WRONG dates
//    (Jan/Feb/Mar/May all claim May-2026 because of template error).
// 4. Interpolate between anchors and extrapolate backwards to assign true months.
function parseGvizDirect(data,br){
  const rows=(data&&data.table&&data.table.rows)||[];
  const res={};
  const pV=c=>(!c||c.v==null)?0:parseFloat(String(c.v).replace(/,/g,''))||0;
  const pI=c=>(!c||c.v==null)?0:parseInt(c.v)||0;
  // ── Pass 1: collect sections in file order ────────────────────────────────
  const sections=[]; // [{bnd,daily,cMon,cYr}]
  let cur=null;
  rows.forEach(row=>{
    const c=row.c||[];
    let day=0,mon=0,yr=0;
    function trySerial(v){const n=typeof v==='number'?v:parseFloat(String(v).replace(/,/g,''));if(isNaN(n)||n<40000||n>50000)return null;const d=new Date(Math.round((n-25569)*86400000));const y=d.getUTCFullYear();if(y<2024||y>2030)return null;return{day:d.getUTCDate(),mon:d.getUTCMonth()+1,yr:y};}
    for(const ci of [c[1],c[0]]){
      if(!ci)continue;
      if(ci.v!=null){const cv=String(ci.v);const dm=cv.match(/^Date\((\d+),(\d+),(\d+)\)$/);if(dm){day=+dm[3];mon=+dm[2]+1;yr=+dm[1];break;}const ser=trySerial(ci.v);if(ser){day=ser.day;mon=ser.mon;yr=ser.yr;break;}const tx=cv.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(tx){day=+tx[1];mon=+tx[2];yr=+tx[3];break;}const ss=trySerial(cv);if(ss){day=ss.day;mon=ss.mon;yr=ss.yr;break;}}
      if(ci.f){const fv=String(ci.f);const tf=fv.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(tf){day=+tf[1];mon=+tf[2];yr=+tf[3];break;}const sf=trySerial(fv);if(sf){day=sf.day;mon=sf.mon;yr=sf.yr;break;}}
    }
    const isDate=day>0&&mon>=1&&mon<=12&&yr>=2024;
    if(!isDate){
      const tgt=pV(c[2]),act=pV(c[3]);
      if(tgt>0||act>0){
        // Mono Park January: gviz strips serial dates → date cells return null
        // These look like non-date rows (isDate=false) but are actually daily rows
        const isMonoStripped=br==="MonoPark"&&cur&&tgt>0&&tgt<15000;
        if(isMonoStripped){
          cur.daily.push({day:cur.daily.length+1,mon:0,yr:0,actual:act,tc:pI(c[5]),instore:pV(c[7]),delivery:pV(c[8]),grab:pV(c[9]),lman:pV(c[10])});
        } else {
          cur={bnd:{target:tgt,actual:act,tc:pI(c[5]),instore:pV(c[7]),delivery:pV(c[8]),grab:pV(c[9]),lman:pV(c[10])},
               daily:[],cMon:0,cYr:0};
          sections.push(cur);
        }
      }
    } else {
      if(!cur){
        cur={bnd:{target:0,actual:0,tc:0,instore:0,delivery:0,grab:0,lman:0},daily:[],cMon:0,cYr:0};
        sections.push(cur);
      }
      cur.daily.push({day,mon,yr,actual:pV(c[3]),tc:pI(c[5]),
                      instore:pV(c[7]),delivery:pV(c[8]),grab:pV(c[9]),lman:pV(c[10])});
      cur.cMon=mon; cur.cYr=yr;
    }
  });
  if(!sections.length)return res;
  // ── Pass 2: assign months — direct for known, infer backwards for gviz-stripped months ──
  const trueMons=sections.map(s=>s.cMon>0&&s.cYr>=2024?{mon:s.cMon,yr:s.cYr}:null);
  const _fk=sections.findIndex(s=>s.cMon>0&&s.cYr>=2024);
  if(_fk>0){let _m=sections[_fk].cMon,_y=sections[_fk].cYr;for(let _i=_fk-1;_i>=0;_i--){_m--;if(_m<1){_m=12;_y--;}if(_y>=2024)trueMons[_i]={mon:_m,yr:_y};}}
  // ── Build result ──────────────────────────────────────────────────────────
  sections.forEach((s,i)=>{
    const tm=trueMons[i];
    if(!tm||!tm.mon)return;
    if(!res[br])res[br]={};
    const key=tm.yr+'-'+tm.mon;
    res[br][key]={
      sum:s.bnd,
      daily:s.daily.map(d=>({...d,mon:d.mon||tm.mon,yr:d.yr||tm.yr})),
      month:tm.mon,year:tm.yr,
      daysInMon:new Date(tm.yr,tm.mon,0).getDate()
    };
  });
  return res;
}

// ── calcMon ───────────────────────────────────────────────────────────────
function calcMon(data,key){
  const out={key,actual:0,target:0,tc:0,instore:0,delivery:0,grab:0,lman:0,daysElapsed:0,branches:{}};
  BRANCHES.forEach(br=>{
    const d=data[br]&&data[br][key];
    if(!d){out.branches[br]={actual:0,target:0,tc:0,instore:0,delivery:0,grab:0,lman:0,daysElapsed:0,daysWithSales:0,daily:[]};return;}
    const act=d.daily.filter(r=>r.actual>0);
    const b={actual:0,target:d.sum?d.sum.target:0,tc:0,instore:0,delivery:0,grab:0,lman:0,daysElapsed:act.length?Math.max(...act.map(r=>r.day)):0,daysWithSales:act.length,daily:d.daily};
    act.forEach(r=>{b.actual+=r.actual;b.tc+=r.tc;b.instore+=r.instore;b.delivery+=r.delivery;b.grab+=r.grab;b.lman+=r.lman;});
    b.ta=b.tc>0?Math.round(b.actual/b.tc):0;
    out.actual+=b.actual;out.target+=b.target;out.tc+=b.tc;out.instore+=b.instore;out.delivery+=b.delivery;out.grab+=b.grab;out.lman+=b.lman;
    if(b.daysElapsed>out.daysElapsed)out.daysElapsed=b.daysElapsed;
    out.branches[br]=b;
  });
  out.ta=out.tc>0?Math.round(out.actual/out.tc):0;
  const[cy,cm]=key.split('-').map(Number);
  out.month=cm;out.year=cy;out.daysInMon=new Date(cy,cm,0).getDate();
  return out;
}

// ── calcWeekCross: 7-day window, spans month boundary if needed ───────────
function calcWeekCross(data,curKey,prevKey,cwEnd){
  const[cy,cm]=curKey.split('-').map(Number);
  const[py,pm]=prevKey?prevKey.split('-').map(Number):[cy,cm===1?12:cm-1];
  const prevMon=prevKey?new Date(py,pm,0).getDate():0;
  const absLbl=d=>{if(d>=1)return d+' '+MON3[cm];const pd=prevMon+d;return pd>=1?pd+' '+MON3[pm]:'?';};
  function sumR(cD,pD,s,e){
    let sales=0,tc=0,instore=0,grab=0,lman=0,delivery=0;
    for(let d=s;d<=e;d++){
      let r=null;
      if(d>=1)r=(cD||[]).find(x=>x.day===d&&x.actual>0)||null;
      else if(prevMon>0){const pd=prevMon+d;if(pd>=1)r=(pD||[]).find(x=>x.day===pd&&x.actual>0)||null;}
      if(r){sales+=r.actual;tc+=r.tc;instore+=r.instore;grab+=r.grab;lman+=r.lman;delivery+=r.delivery;}
    }
    return{sales,tc,ta:tc>0?Math.round(sales/tc):0,instore,grab,lman,delivery};
  }
  const cwS=cwEnd-6,pwE=cwEnd-7,pwS=cwEnd-13;
  const cwLbl=absLbl(cwS)+'–'+absLbl(cwEnd);
  const pwLbl=absLbl(pwS)+'–'+absLbl(pwE);
  const cw={total:{sales:0,tc:0,ta:0,instore:0,grab:0,lman:0,delivery:0}};
  const pw={total:{sales:0,tc:0,ta:0,instore:0,grab:0,lman:0,delivery:0}};
  BRANCHES.forEach(br=>{
    const cD=data[br]&&data[br][curKey]?data[br][curKey].daily:[];
    const pD=prevKey&&data[br]&&data[br][prevKey]?data[br][prevKey].daily:[];
    const cwB=sumR(cD,pD,cwS,cwEnd);const pwB=sumR(cD,pD,pwS,pwE);
    cw[br]=cwB;pw[br]=pwB;
    ['sales','tc','instore','grab','lman','delivery'].forEach(k=>{cw.total[k]+=cwB[k];pw.total[k]+=pwB[k];});
  });
  cw.total.ta=cw.total.tc>0?Math.round(cw.total.sales/cw.total.tc):0;
  pw.total.ta=pw.total.tc>0?Math.round(pw.total.sales/pw.total.tc):0;
  return{cw,pw,cwLbl,pwLbl};
}

let allData=null,months=[],curKey='',prevKey='',dataMode='',lastRefresh=null;
function buildTabs(){
  const wrap=document.getElementById('mnTabs');if(!wrap)return;wrap.innerHTML='';
  months.slice().reverse().forEach(k=>{
    const[y,m]=k.split('-').map(Number);
    const btn=document.createElement('button');btn.className='mn-tab'+(k===curKey?' active':'');
    btn.textContent=TH_MON[m]+' '+y;

    wrap.appendChild(btn);
  });
}

// ── loadData ──────────────────────────────────────────────────────────────
async function loadData(){
  setLoading('กำลังโหลด...');destroyAll();
  try{
    let txt='';
    // Cowork MCP path
    if(window.cowork&&typeof window.cowork.callMcpTool==='function'){
      setLoading('🔗 เชื่อมต่อ Cowork...');
      try{
        function extractTxt(r,d){
          if(d>4||!r)return'';if(typeof r==='string')return r;if(r.fileContent)return r.fileContent;
          if(r.content&&typeof r.content==='string')return r.content;
          if(Array.isArray(r.content))return r.content.map(i=>i&&(i.text||i.content)||'').join('\n');
          if(Array.isArray(r))return r.map(i=>typeof i==='string'?i:extractTxt(i,d+1)).join('');
          if(r.text)return r.text;if(r.result)return extractTxt(r.result,d+1);if(r.data)return extractTxt(r.data,d+1);return'';
        }
        const tmout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('cowork_timeout')),30000));
        const res=await Promise.race([window.cowork.callMcpTool(MCP_TOOL,{fileId:FILE_ID}),tmout]);
        let raw=extractTxt(res,0);
        if(raw&&(raw.trimStart()[0]==='{' || raw.trimStart()[0]==='[')){try{const j=JSON.parse(raw);const inner=extractTxt(j,0);if(inner&&inner.length>100)raw=inner;}catch(e){}}
        if(raw&&raw.length>100){txt=raw;dataMode='cowork';}
      }catch(e){if(e.message!=='cowork_timeout')console.warn('Cowork:',e.message);}
    }

    // JSONP path — fetch each known sheet + auto-discover new ones in background
    if(!txt){
      dataMode='direct';allData={};
      // Primary list — always fetched. New branches added to Google Sheet are
      // auto-discovered on next load via fetchSheetNames() running in background.
      // 1. Try "Branches" config sheet first (sequential, most reliable)
      const configList=await fetchSheetNamesFromConfig();
      // 2. Kick off Sheets Feeds API v3 in background (works if spreadsheet is Published)
      const discoveryPromise=fetchSheetNamesFeeds().catch(()=>[]);
      // 3. Default hardcoded list — used if Branches sheet not found
      const defaultList=['Home Pro Bangna','Home Pro Rangsit','Victory','Mono Park','Samyan Mitrtown','True Digital Park','Secon Srinakarin'];
      let sheetNames=configList.length>0?configList:defaultList;
      console.log('[loadData] sheetNames source:'+(configList.length>0?'Branches sheet':'hardcoded'),'list:',sheetNames);
      // Fetch each sheet and register branch dynamically
      const steps=sheetNames.map(s=>'⏳ '+s);
      for(let i=0;i<sheetNames.length;i++){
        const sheetName=sheetNames[i];
        steps[i]='🔄 '+sheetName+'...';
        setLoading('📡 Google Sheet ('+(i+1)+'/'+sheetNames.length+')',steps);
        try{
          const d=await fetchGvizSheet(sheetName);
          const bk=normBrKey(sheetName);
          regBranch(bk,sheetName);
          if(!allData[bk])allData[bk]={};
          const p=parseGvizDirect(d,bk);
          if(!allData[bk])allData[bk]={};
          Object.assign(allData[bk],(p[bk]||{}));
          const rows=d&&d.table&&d.table.rows?d.table.rows.length:0;
          const foundMons=Object.keys(allData[bk]).sort().map(k=>{const[y,m]=k.split('-');return TH_MON[+m];}).join(', ');
          steps[i]='✅ '+sheetName+' ('+rows+' rows | '+(foundMons||'ไม่มีเดือน')+')';
        }catch(e){
          console.warn('JSONP',sheetName,e.message);
          steps[i]='❌ '+sheetName+': '+e.message;
        }
        setLoading('📡 Google Sheet ('+(i+1)+'/'+sheetNames.length+')',steps);
      }
      // Merge any extra sheets found by Feeds API (not already fetched)
      try{
        const skipWords=['summary','overview','template','config','branches','รวม','ภาพรวม'];
        const discovered=(await discoveryPromise).filter(n=>
          !skipWords.some(w=>n.toLowerCase().includes(w))&&
          !sheetNames.some(s=>s.toLowerCase()===n.toLowerCase())
        );
        for(const extra of discovered){
          try{
            const d=await fetchGvizSheet(extra);
            const bk=normBrKey(extra);
            regBranch(bk,extra);
            if(!allData[bk])allData[bk]={};
            const p=parseGvizDirect(d,bk);
            Object.assign(allData[bk],(p[bk]||{}));
          }catch(e){console.warn('Extra sheet',extra,e.message);}
        }
      }catch(e){}
      // Compute BRANCHES from what actually returned data
      BRANCHES=Object.keys(allData).filter(b=>Object.keys(allData[b]||{}).length>0);
      const mSet=new Set();BRANCHES.forEach(b=>Object.keys(allData[b]||{}).forEach(k=>mSet.add(k)));
      months=[...mSet].sort((a,b)=>{const[ay,am]=a.split('-').map(Number);const[by,bm]=b.split('-').map(Number);return ay!==by?ay-by:am-bm;});
      curKey=months[months.length-1]||'';prevKey=months.length>1?months[months.length-2]:'';
      if(!curKey){
        document.getElementById('mainContent').innerHTML=
          '<div class="err">❌ ดึงข้อมูลจาก Google Sheet ไม่ได้<br><br>'+
          '<b>สาเหตุที่เป็นไปได้:</b><br>'+
          '• Sheet ไม่ได้ตั้งเป็น "Anyone with link" (Public)<br>'+
          '• ไม่มี Internet<br>'+
          '• ตรวจสอบว่า Sheet เป็น Public (Anyone with link can view)<br><br>'+
          '<a href="https://docs.google.com/spreadsheets/d/'+FILE_ID+'" target="_blank">🔗 เปิด Google Sheet</a>'+
          '</div>';return;
      }
      lastRefresh=new Date();render(allData,curKey,prevKey);return;
    }

    // Cowork parse path
    txt=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
    if(!txt||txt.length<100)throw new Error('ข้อมูลว่าง');
    allData=parseSheet(txt);
    // Compute BRANCHES dynamically from what was parsed (includes new branches)
    BRANCHES=Object.keys(allData).filter(b=>Object.keys(allData[b]||{}).length>0);
    const mSet=new Set();BRANCHES.forEach(b=>Object.keys(allData[b]||{}).forEach(k=>mSet.add(k)));
    months=[...mSet].sort((a,b)=>{const[ay,am]=a.split('-').map(Number);const[by,bm]=b.split('-').map(Number);return ay!==by?ay-by:am-bm;});
    curKey=months[months.length-1]||'';prevKey=months.length>1?months[months.length-2]:'';
    if(!curKey)throw new Error('ไม่พบ Sale Performance');
    lastRefresh=new Date();render(allData,curKey,prevKey);

  }catch(e){
    console.error('loadData error:',e);
    document.getElementById('mainContent').innerHTML='<div class="err">❌ โหลดข้อมูลไม่ได้: '+e.message+'</div>';
  }
}
loadData().catch(function(e){
  const el=document.getElementById('mainContent');
  if(el)el.innerHTML='<div class="err">❌ loadData failed: '+e.message+'</div>';
});
// Fallback: if nothing rendered after 40s, show timeout error
setTimeout(function(){
  const el=document.getElementById('mainContent');
  if(el&&el.querySelector('.loading')){
    el.innerHTML='<div class="err">⏱ Timeout: ไม่สามารถโหลดข้อมูลได้<br>กรุณาตรวจสอบ Internet และ Google Sheet เป็น Public<br><a href="https://docs.google.com/spreadsheets/d/1sWd6IQl-5P65i4xTzsSqHOH77P5Zd1PIkzZdtQOteUg" target="_blank">🔗 เปิด Google Sheet</a></div>';
  }
},40000);
</script></body></html>
